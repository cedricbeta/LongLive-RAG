# Object reappearance test: object in scene → leaves → returns (3 segments)
# Baseline (no RAG)

denoising_step_list:
- 1000
- 750
- 500
- 250
warp_denoising_step: true
num_frame_per_block: 3
model_name: Wan2.1-T2V-1.3B
model_kwargs:
  local_attn_size: 12
  timestep_shift: 5.0
  sink_size: 3

# Inference
data_path: prompts_object_reappear.jsonl
output_folder: videos/object-reappear-baseline
inference_iter: -1
num_output_frames: 120
use_ema: false
seed: 0
num_samples: 1
save_with_index: true
switch_frame_indices: 40, 80
global_sink: true
context_noise: 0

# RAG disabled
rag_enabled: false
rag_top_k: 6
rag_bank_size: 256

generator_ckpt: longlive_models/models/longlive_base.pt
lora_ckpt: longlive_models/models/lora.pt

adapter:
  type: "lora"
  rank: 256
  alpha: 256
  dropout: 0.0
  dtype: "bfloat16"
  verbose: false
