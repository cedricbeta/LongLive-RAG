# Walk-away test: RAG with salient_topk embedding strategy
# Pools only the top-K highest-norm tokens, ignoring background

denoising_step_list:
- 1000
- 750
- 500
- 250
warp_denoising_step: true
num_frame_per_block: 3
model_name: Wan2.1-T2V-1.3B
model_kwargs:
  local_attn_size: 12
  timestep_shift: 5.0
  sink_size: 3

# Inference
data_path: prompts_walkaway.jsonl
output_folder: videos/walkaway-rag-salient-topk
inference_iter: -1
num_output_frames: 120
use_ema: false
seed: 0
num_samples: 1
save_with_index: true
switch_frame_indices: 40, 80
global_sink: false
context_noise: 0

# RAG with salient_topk embedding
rag_enabled: true
rag_top_k: 6
rag_bank_size: 256
rag_embedding: salient_topk

generator_ckpt: longlive_models/models/longlive_base.pt
lora_ckpt: longlive_models/models/lora.pt

adapter:
  type: "lora"
  rank: 256
  alpha: 256
  dropout: 0.0
  dtype: "bfloat16"
  verbose: false
